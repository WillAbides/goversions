systems:
  - darwin/amd64
  - darwin/arm64
  - linux/amd64
dependencies:
  gobin:
    template: origin#gobin
    vars:
      version: 0.0.14
  golangci-lint:
    template: origin#golangci-lint
    vars:
      version: 2.11.3
  goreleaser:
    template: origin#goreleaser
    vars:
      version: 0.154.0
  octo:
    template: origin#octo
    vars:
      version: 0.23.0
  shellcheck:
    template: origin#shellcheck
    vars:
      version: 0.7.1
templates:
  origin#gobin:
    url: https://github.com/myitcv/gobin/releases/download/v{{.version}}/{{.os}}-{{.arch}}
    archive_path: '{{.os}}-{{.arch}}'
    bin: gobin
    overrides:
      - matcher:
          arch:
            - arm64
          os:
            - darwin
        dependency:
          vars:
            arch: amd64
    systems:
      - darwin/386
      - darwin/amd64
      - freebsd/386
      - freebsd/amd64
      - freebsd/arm
      - linux/386
      - linux/amd64
      - linux/arm
      - netbsd/386
      - netbsd/amd64
      - netbsd/arm
      - openbsd/386
      - openbsd/amd64
      - windows/386
      - windows/amd64
    required_vars:
      - version
  origin#golangci-lint:
    homepage: https://golangci-lint.run
    description: Fast linters Runner for Go
    url: https://github.com/golangci/golangci-lint/releases/download/v{{.version}}/golangci-lint-{{.version}}-{{.os}}-{{.arch}}{{.urlSuffix}}
    archive_path: golangci-lint-{{.version}}-{{.os}}-{{.arch}}/golangci-lint{{.archivePathSuffix}}
    bin: golangci-lint
    vars:
      archivePathSuffix: ""
      urlSuffix: .tar.gz
    overrides:
      - matcher:
          os:
            - windows
        dependency:
          vars:
            archivePathSuffix: .exe
            urlSuffix: .zip
          substitutions:
            arch:
              arm: armv6
      - matcher:
          arch:
            - arm64
          os:
            - darwin
        dependency:
          vars:
            arch: amd64
    substitutions:
      arch:
        arm: armv6
    systems:
      - darwin/amd64
      - darwin/arm64
      - freebsd/386
      - freebsd/amd64
      - freebsd/arm
      - linux/386
      - linux/amd64
      - linux/arm
      - linux/arm64
      - linux/loong64
      - linux/mips64
      - linux/mips64le
      - linux/ppc64le
      - linux/riscv64
      - linux/s390x
      - netbsd/386
      - netbsd/amd64
      - netbsd/arm
      - windows/386
      - windows/amd64
      - windows/arm
      - windows/arm64
    required_vars:
      - version
  origin#goreleaser:
    url: https://github.com/goreleaser/goreleaser/releases/download/v{{.version}}/goreleaser_{{.os}}_{{.arch}}{{.urlsuffix}}
    archive_path: goreleaser{{.archivepathsuffix}}
    bin: goreleaser
    vars:
      archivepathsuffix: ""
      urlsuffix: .tar.gz
    overrides:
      - matcher:
          os:
            - windows
        dependency:
          vars:
            archivepathsuffix: .exe
            urlsuffix: .zip
    substitutions:
      arch:
        "386": i386
        amd64: x86_64
      os:
        darwin: Darwin
        linux: Linux
        windows: Windows
    systems:
      - darwin/amd64
      - linux/386
      - linux/amd64
      - windows/386
      - windows/amd64
    required_vars:
      - version
  origin#octo:
    url: https://github.com/octo-cli/octo-cli/releases/download/v{{.version}}/octo-cli_{{.version}}_{{.os}}_{{.arch}}.tar.gz
    archive_path: octo{{.archivepathsuffix}}
    bin: octo
    vars:
      archivepathsuffix: ""
    overrides:
      - matcher:
          os:
            - windows
        dependency:
          vars:
            archivepathsuffix: .exe
      - matcher:
          arch:
            - arm64
          os:
            - darwin
        dependency:
          vars:
            arch: amd64
    substitutions:
      arch:
        "386": i386
        amd64: x86_64
      os:
        darwin: Darwin
        linux: Linux
        windows: Windows
    systems:
      - darwin/386
      - darwin/amd64
      - linux/386
      - linux/amd64
      - windows/386
      - windows/amd64
    required_vars:
      - version
  origin#shellcheck:
    homepage: https://www.shellcheck.net
    description: ShellCheck, a static analysis tool for shell scripts
    url: https://github.com/koalaman/shellcheck/releases/download/v{{.version}}/shellcheck-v{{.version}}.{{.os}}.{{.arch}}{{.urlSuffix}}
    archive_path: shellcheck-v{{.version}}/shellcheck{{.archivePathSuffix}}
    bin: shellcheck
    vars:
      archivePathSuffix: ""
      urlSuffix: .tar.xz
    overrides:
      - matcher:
          os:
            - windows
        dependency:
          url: https://github.com/koalaman/shellcheck/releases/download/v{{.version}}/shellcheck-v{{.version}}.zip
          archive_path: shellcheck.exe
      - matcher:
          arch:
            - arm64
          os:
            - darwin
        dependency:
          substitutions:
            arch:
              arm64: x86_64
    substitutions:
      arch:
        amd64: x86_64
        arm: armv6hf
        arm64: aarch64
    systems:
      - darwin/amd64
      - darwin/arm64
      - linux/amd64
      - linux/arm
      - linux/arm64
      - windows/amd64
    required_vars:
      - version
template_sources:
  origin: https://raw.githubusercontent.com/WillAbides/bindown-templates/master/bindown.yml
