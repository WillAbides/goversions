version: "2"
linters:
  enable:
    - goconst
    - gocritic
    - gocyclo
    - gosec
    - unconvert
  settings:
    errcheck:
      check-blank: true
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
    gocritic:
      enabled-tags:
        - style
        - diagnostic
        - performance
      disabled-checks:
        - hugeParam
    gocyclo:
      min-complexity: 15
  exclusions:
    generated: lax
    rules:
      - linters:
          - dupl
          - goconst
          - gosec
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofumpt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
